name: dep-bots
description: Dependabot or Renovate dependency-update config
version: 1.0.0
language: go
requires: [base-layout]
questions:
  - id: dep_bot
    prompt: "Dependency update bot"
    type: select
    options: [dependabot, renovate, none]
    default: dependabot
files: # dest is always "." — src carries the subdir (see Task 5 note)
  - src: ".github/dependabot.yml"
    dest: "."
    when: '{{ eq .dep_bot "dependabot" }}'
  - src: "renovate.json5"
    dest: "."
    when: '{{ eq .dep_bot "renovate" }}'
