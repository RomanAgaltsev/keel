name: govulncheck
on:
  push: { branches: [main] }
  pull_request:
  schedule: [{ cron: "0 7 * * 1" }]
permissions:
  contents: read
jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
