version: "3"

vars:
  GO: go
  PKG: ./...
  BIN: "{{.ROOT_DIR}}/bin"
  GOLANGCI_VERSION: v2.3.0

env:
  GOBIN: "{{.ROOT_DIR}}/bin"

tasks:
  default:
    cmds: [task --list]
    silent: true
  tools:
    desc: Install pinned dev tools into ./bin
    cmds:
      - "{{.GO}} install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_VERSION}}"
  vet:
    cmds: ["{{.GO}} vet {{.PKG}}"]
  test:
    cmds: ["{{.GO}} test -race -shuffle=on {{.PKG}}"]
  lint:
    cmds: ["{{.BIN}}/golangci-lint run {{.PKG}}"]
  tidy:check:
    cmds:
      - "{{.GO}} mod tidy"
      - git diff --exit-code -- go.mod go.sum
  ci:
    desc: full local gate
    cmds:
      - task: tidy:check
      - task: vet
      - task: lint
      - task: test
