name: module-version
on:
  pull_request:
    paths: ["modules/**"]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: git fetch origin "${{ github.base_ref }}"
      - run: go run ./internal/tools/modulecheck "origin/${{ github.base_ref }}"
