name: outdated
on:
  schedule: [{ cron: "0 6 * * 1" }]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  outdated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: go run ./cmd/keel outdated --tools-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
